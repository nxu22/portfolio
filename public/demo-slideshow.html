<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminary Goods — WhatsApp Agent Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EDE6D4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px 20px;
    }

    .scene-label {
      color: rgba(255, 255, 255, 0.45);
      font-size: 11.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
      height: 18px;
      transition: opacity 0.3s;
    }

    /* Phone frame */
    .phone-frame {
      width: 320px;
      background: #1c1c1e;
      border-radius: 44px;
      padding: 10px;
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.07),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      position: relative;
    }

    /* Notch */
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 22px;
      background: #1c1c1e;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }

    .phone-screen {
      border-radius: 36px;
      overflow: hidden;
      height: 580px;
      display: flex;
      flex-direction: column;
      background: #ece5dd;
    }

    /* Status bar */
    .status-bar {
      background: #075e54;
      padding: 6px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 28px;
    }

    .status-bar-time {
      color: white;
      font-size: 11px;
      font-weight: 600;
    }

    .status-bar-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .status-bar-icons svg {
      fill: white;
      width: 13px;
      height: 13px;
    }

    /* WhatsApp header */
    .wa-header {
      background: #075e54;
      padding: 8px 12px 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }

    .wa-back {
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      line-height: 1;
      margin-right: 2px;
    }

    .wa-avatar {
      width: 36px;
      height: 36px;
      background: #128c7e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.2);
    }

    .wa-header-info { flex: 1; }

    .wa-header-name {
      color: white;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
    }

    .wa-header-status {
      color: rgba(255, 255, 255, 0.72);
      font-size: 11.5px;
    }

    .wa-header-icons {
      display: flex;
      gap: 14px;
      color: rgba(255,255,255,0.85);
      font-size: 18px;
    }

    /* Chat wallpaper area */
    .wa-chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px 9px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background-color: #ece5dd;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c5b9aa' fill-opacity='0.18'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .wa-chat::-webkit-scrollbar { display: none; }

    .date-chip {
      align-self: center;
      background: rgba(225, 215, 200, 0.85);
      color: #555;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 8px;
      margin: 4px 0 6px;
    }

    /* Bubbles */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .bubble-wrap.sent { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.received { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 6px 9px 4px;
      border-radius: 8px;
      font-size: 13.5px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    .bubble .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      margin-top: 2px;
    }

    .bubble .time {
      font-size: 10.5px;
      color: rgba(0, 0, 0, 0.38);
      line-height: 1;
    }

    .sent .bubble {
      background: #dcf8c6;
      border-bottom-right-radius: 2px;
    }

    .received .bubble {
      background: #ffffff;
      border-bottom-left-radius: 2px;
      color: #111;
    }

    /* Bubble tails */
    .sent .bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -7px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 8px 8px;
      border-color: transparent transparent #dcf8c6 transparent;
    }

    .received .bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -7px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 8px 8px 0;
      border-color: transparent #ffffff transparent transparent;
    }

    /* Input bar */
    .wa-input {
      background: #f0f0f0;
      padding: 7px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .wa-input-box {
      flex: 1;
      background: white;
      border-radius: 22px;
      padding: 7px 14px;
      font-size: 13px;
      color: #999;
    }

    .wa-input-mic {
      width: 40px;
      height: 40px;
      background: #075e54;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Progress + dots */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      width: 320px;
    }

    .progress-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #25d366;
      border-radius: 2px;
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .dot:hover { transform: scale(1.3); }
    .dot.active { background: #25d366; transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="scene-label" id="scene-label"></div>

  <div class="phone-frame">
    <div class="phone-screen">

      <div class="status-bar">
        <span class="status-bar-time" id="clock">9:41</span>
        <div class="status-bar-icons">
          <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
          <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
        </div>
      </div>

      <div class="wa-header">
        <div class="wa-back">‹</div>
        <div class="wa-avatar">LG</div>
        <div class="wa-header-info">
          <div class="wa-header-name">Luminary Goods</div>
          <div class="wa-header-status">online</div>
        </div>
        <div class="wa-header-icons">
          <span>📞</span>
          <span>⋮</span>
        </div>
      </div>

      <div class="wa-chat" id="wa-chat"></div>

      <div class="wa-input">
        <div class="wa-input-box">Message</div>
        <div class="wa-input-mic">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="8" y1="23" x2="16" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

    </div>
  </div>


  <script>
    const scenes = [
      {
        label: 'Scene 1 — Shipping inquiry',
        date: 'Today',
        messages: [
          { from: 'user', text: 'Hi how long does shipping take to Canada', time: '10:14' },
          { from: 'aria', text: 'Hi! 👋 Shipping to Canada typically takes *7–12 business days*. You\'ll receive a tracking number with your order so you can monitor its progress. 📦 Is there anything else I can help you with?', time: '10:14' },
          { from: 'user', text: 'Great, do you provide tracking', time: '10:15' },
          { from: 'aria', text: 'Yes, absolutely! We provide a tracking number with every order. 📍 You\'ll be able to use it to monitor your shipment in real-time. Is there anything else you\'d like to know?', time: '10:15' },
        ]
      },
      {
        label: 'Scene 2 — Return policy',
        date: 'Today',
        messages: [
          { from: 'user', text: 'I want to return a cushion I bought 2 weeks ago, just don\'t like the color', time: '14:22' },
          { from: 'aria', text: 'No problem! We can help with that. 😊 Since you\'re returning it because you changed your mind, you\'d cover the return shipping cost. Once we receive it back, we\'ll process your refund within *3–5 business days*. Just make sure the cushion is unused and in its original packaging. Do you have your order number handy?', time: '14:22' },
          { from: 'user', text: 'How long until I get my refund', time: '14:23' },
          { from: 'aria', text: '1. You send the cushion back (you cover shipping)\n2. Once we receive it, we process your refund within *3–5 business days*\n3. The refund goes back to your original payment method', time: '14:23' },
        ]
      },
      {
        label: 'Scene 3 — Conversation memory',
        date: 'Today',
        messages: [
          { from: 'user', text: 'My order #LG-2847 hasn\'t arrived, it\'s been 14 days, I\'m in California', time: '09:05' },
          { from: 'aria', text: 'I\'m sorry to hear that! For California (North America), our standard shipping window is *7–12 business days*. At 14 days you\'re past the typical range. Could you confirm your order number so I can look into this for you?', time: '09:05' },
          { from: 'user', text: 'So based on what you just told me, am I past the normal shipping window?', time: '09:06' },
          { from: 'aria', text: 'Yes — based on the *7–12 business day* window I mentioned, 14 days does put you past the normal timeframe. Let me escalate this to our team to investigate your shipment. 🔍', time: '09:06' },
        ]
      }
    ]

    const DURATION = 5000
    let current = 0
    let timer = null

    const chatEl = document.getElementById('wa-chat')
    const labelEl = document.getElementById('scene-label')
    const progressEl = document.getElementById('progress-bar')
    const dotsEl = document.getElementById('dots')

    // Build dots
    scenes.forEach((_, i) => {
      const dot = document.createElement('div')
      dot.className = 'dot' + (i === 0 ? ' active' : '')
      dot.addEventListener('click', () => goTo(i))
      dotsEl.appendChild(dot)
    })

    // Live clock
    function updateClock() {
      const now = new Date()
      document.getElementById('clock').textContent =
        now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0')
    }
    updateClock()
    setInterval(updateClock, 30000)

    function fmt(text) {
      return text
        .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
    }

    function renderScene(index) {
      const scene = scenes[index]
      labelEl.textContent = scene.label
      chatEl.innerHTML = ''

      const chip = document.createElement('div')
      chip.className = 'date-chip'
      chip.textContent = scene.date
      chatEl.appendChild(chip)

      scene.messages.forEach(msg => {
        const wrap = document.createElement('div')
        wrap.className = 'bubble-wrap ' + (msg.from === 'user' ? 'sent' : 'received')

        const bubble = document.createElement('div')
        bubble.className = 'bubble'
        bubble.innerHTML = fmt(msg.text) + `<div class="meta"><span class="time">${msg.time}</span>${msg.from === 'user' ? '<svg width="14" height="9" viewBox="0 0 16 11" fill="none"><path d="M1 5.5L4.5 9L10 3" stroke="#53bdeb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 5.5L9.5 9L15 3" stroke="#53bdeb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div>`

        wrap.appendChild(bubble)
        chatEl.appendChild(wrap)
      })

      chatEl.scrollTop = chatEl.scrollHeight

      // Update dots
      document.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === index)
      )

      // Animate progress bar
      progressEl.style.transition = 'none'
      progressEl.style.width = '0%'
      requestAnimationFrame(() => requestAnimationFrame(() => {
        progressEl.style.transition = `width ${DURATION}ms linear`
        progressEl.style.width = '100%'
      }))
    }

    function goTo(index) {
      clearTimeout(timer)
      current = index
      renderScene(current)
      schedule()
    }

    function schedule() {
      timer = setTimeout(() => {
        current = (current + 1) % scenes.length
        renderScene(current)
        schedule()
      }, DURATION)
    }

    renderScene(0)
    schedule()
  </script>
</body>
</html>
